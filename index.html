<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Can Scan" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <title>Can Scan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #22d3ee;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      min-height: 100vh;
    }

    body {
      padding: max(env(safe-area-inset-top), 12px) 12px max(env(safe-area-inset-bottom), 12px);
      max-width: 560px;
      margin: 0 auto;
    }

    header.app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0;
      letter-spacing: 0.02em;
    }

    h2 {
      font-size: 1rem;
      margin: 0;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface);
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .status-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
    }

    .status-pill.online .dot { background: var(--success); }
    .status-pill.offline .dot { background: var(--warning); }

    section {
      background: var(--surface);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    section > header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    #reader {
      width: 100%;
      height: 30vh;
      min-height: 200px;
      max-height: 320px;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    #reader:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    #reader:empty::after {
      content: "Camera off — tap Start";
    }

    /* Constrain html5-qrcode's injected wrapper to fill our box */
    #reader__scan_region {
      height: 100% !important;
      width: 100% !important;
    }

    .scanner-controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0f172a;
      cursor: pointer;
      font-family: inherit;
    }

    button:active { transform: scale(0.98); }

    button.secondary {
      background: var(--surface-2);
      color: var(--text);
    }

    button.small {
      flex: 0 0 auto;
      padding: 6px 12px;
      font-size: 0.85rem;
    }

    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .last-scan {
      padding: 12px 14px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      word-break: break-all;
    }

    .last-scan.flash {
      animation: flash 600ms ease-out;
    }

    @keyframes flash {
      0%   { background: rgba(34, 197, 94, 0.25); border-color: var(--success); }
      100% { background: var(--bg); border-color: var(--border); }
    }

    .last-scan .code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .last-scan .url {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .last-scan .meta {
      color: var(--text-dim);
      font-size: 0.72rem;
      margin-top: 6px;
    }

    .note-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }

    .note-row label {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .history-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-left: 6px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    ul.history {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 60vh;
      overflow-y: auto;
    }

    ul.history li {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    ul.history li:last-child { border-bottom: none; }

    .history-status {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 7px;
    }

    .history-status.pending { background: var(--warning); }
    .history-status.synced  { background: var(--success); }
    .history-status.error   { background: var(--danger); }

    .history-body {
      flex: 1;
      min-width: 0;
    }

    .history-code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
      word-break: break-all;
    }

    .history-url {
      font-size: 0.72rem;
      word-break: break-all;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .history-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      color: var(--text-dim);
      font-size: 0.85rem;
      text-align: center;
      padding: 18px 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 16px);
      transform: translateX(-50%);
      background: var(--surface-2);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 200ms;
      pointer-events: none;
      max-width: 90vw;
      z-index: 1000;
    }

    .toast.visible { opacity: 1; }

    /* Full-screen success flash on each scan */
    .scan-flash {
      position: fixed;
      inset: 0;
      background: #22c55e;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease-out;
      z-index: 999;
      mix-blend-mode: screen;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-flash svg {
      width: 30vw;
      max-width: 180px;
      height: auto;
      transform: scale(0.7);
      transition: transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
      stroke: white;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .scan-flash.visible {
      opacity: 0.6;
      transition: opacity 60ms ease-in;
    }

    .scan-flash.visible svg {
      transform: scale(1);
      transition: transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* html5-qrcode injects controls we want to hide */
    #reader__dashboard,
    #reader__scan_region img,
    #reader__camera_selection { display: none !important; }

    #reader video {
      border-radius: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Can Scan</h1>
    <div id="connection-status" class="status-pill"><span class="dot"></span><span class="label">…</span></div>
  </header>

  <section id="scanner-section">
    <header>
      <h2>Scanner</h2>
    </header>
    <div id="reader"></div>
    <div class="scanner-controls">
      <button id="start-btn" type="button">Start camera</button>
      <button id="stop-btn" type="button" class="secondary" hidden>Stop camera</button>
    </div>
    <div class="note-row">
      <label for="note-input">Note for next scans (optional)</label>
      <input id="note-input" type="text" placeholder="e.g. kitchen batch" autocomplete="off" />
    </div>
  </section>

  <section id="last-scan-section" hidden>
    <header><h2>Last scan</h2></header>
    <div id="last-scan" class="last-scan"></div>
  </section>

  <section id="history-section">
    <header>
      <h2>History <span id="history-count" class="history-count"></span></h2>
      <button id="sync-btn" type="button" class="secondary small">Sync now</button>
    </header>
    <ul id="history-list" class="history"></ul>
    <div id="history-empty" class="empty">No scans yet.</div>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="scan-flash" class="scan-flash" aria-hidden="true">
    <svg viewBox="0 0 24 24"><polyline points="5,12 10,17 19,8"></polyline></svg>
  </div>

  <script>
    // Mobile devtools — only loads when ?debug=1 is in the URL.
    // Adds a floating green button; tap to open console / elements / network.
    if (new URLSearchParams(location.search).has("debug")) {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/eruda@3.4.3";
      s.onload = () => window.eruda && eruda.init();
      document.head.appendChild(s);
    }
  </script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((err) => {
          console.warn("SW register failed:", err);
        });
      });
    }
  </script>
</body>
</html>
